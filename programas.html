    <style>
        /* 1. Definición de Variables de Color para Temas */
        :root {
            /* Paleta Clara */
            --bg-default: #f7f9fb;
            --bg-secondary: #ffffff;
            --bg-dark: #0f172a; /* Para secciones oscuras en modo claro */
            --bg-dark-accent: #1e293b;

            --text-default: #1e293b;
            --text-secondary: #475569;
            --text-light: #f8fafc; /* Para texto sobre fondos oscuros */
            --text-accent: #2db8ce;

            --border-default: #e2e8f0;
            --border-light: rgba(255, 255, 255, 0.1);

            --shadow-color: rgba(0, 0, 0, 0.1);

            /* Colores para componentes de tarjetas */
            --badge-bg-intermediate: #0891b2; /* cyan-600 */
            --badge-bg-basic: #0d9488; /* teal-600 */
            --badge-text: #ffffff;
            --btn-accent-bg: #0891b2; /* cyan-600 */
            --btn-accent-text: #ffffff;
            --btn-accent-shadow: rgba(8, 145, 178, 0.3);
            --btn-accent-border: #0e7490; /* cyan-700 */
            --btn-accent-bg-hover: #0e7490; /* cyan-700 */
        }

        body:not(.light-mode) {
            /* Paleta Oscura */
            --bg-default: #0f172a;
            --bg-secondary: #1e293b;
            --bg-dark: #0f172a;
            --bg-dark-accent: #1e293b;

            --text-default: #f8fafc;
            --text-secondary: #94a3b8;
            --text-light: #f8fafc;

            --border-default: #334155;
            --border-light: rgba(45, 184, 206, 0.3);

            --shadow-color: rgba(0, 0, 0, 0.25);
        }

        /* --- Estilos Generales --- */
        .section-title {
            color: var(--text-default);
        }

        /* --- Estilos movidos desde index.html y adaptados a variables --- */

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-default);
            margin: 0;
            padding: 0;
            color: var(--text-default);
            scroll-behavior: smooth;
            overflow-x: clip;
            transition: background-color 0.3s, color 0.3s;
        }

        .animate-on-hover { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .animate-on-hover:hover { transform: translateY(-5px) scale(1.01); box-shadow: 0 25px 50px -12px var(--shadow-color); filter: brightness(1.05); }

        .reveal { opacity: 0; transition: all 0.8s cubic-bezier(0.5, 0, 0, 1); }
        .reveal.active { opacity: 1; transform: translate(0, 0, 0) scale(1); }
        .reveal-up { transform: translateY(40px); }
        .reveal-down { transform: translateY(-40px); }
        .reveal-right { transform: translateX(-40px); }

        .btn-glow { position: relative; overflow: hidden; transition: all 0.3s ease; }
        .btn-glow:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); }
        .btn-glow::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); transition: 0.6s;
        }
        .btn-glow:hover::after { left: 100%; }

        /* --- Secciones Tematizables --- */
        .section-themed {
            background-color: var(--bg-default);
            border-top: 1px solid var(--border-default);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .section-themed .section-subtitle {
            color: var(--text-accent);
        }

        .section-themed .section-title {
            color: var(--text-default);
        }

        /* --- Estilo de Tarjetas de Curso (Estilo Catálogo Unificado) --- */
        .course-card {
            background-color: var(--bg-secondary);
            border-radius: 1.5rem; /* 24px */
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease-in-out;
            text-align: left;
            /* Se elimina border y box-shadow base para que lo controlen las clases de nivel */
        }

        .course-card .course-card-image-container {
            position: relative;
            height: 12rem;
            overflow: hidden;
        }

        .course-card .course-card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .course-card:hover .course-card-image {
            transform: scale(1.05);
        }

        .course-card .course-card-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .course-card .course-card-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            z-index: 1;
            padding: 0.25rem 0.75rem;
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 9999px;
            color: var(--badge-text);
        }

        .course-card .badge-intermediate { background-color: var(--badge-bg-intermediate); }
        .course-card .badge-basic { background-color: var(--badge-bg-basic); }

        .course-card .course-card-title {
            color: var(--text-default);
            font-size: 1.125rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 0.5rem;
        }

        .course-card .course-card-description {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 1rem;
            flex-grow: 1;
            line-height: 1.6;
        }

        .course-card .course-card-footer {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid var(--border-default);
        }

        .course-card .course-card-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .course-card .course-card-price {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--text-default);
        }

        .course-card .course-card-stats {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .course-card .like-btn, .course-card .view-container {
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
        }
        .course-card .like-btn.liked { color: #ef4444 !important; }
        .course-card .view-container.has-views { color: #22c55e; }

        .course-card .course-card-buttons {
            display: flex;
            gap: 0.75rem;
        }

        /* Adaptación para que el botón metálico funcione dentro de la tarjeta */
        .course-card .course-card-buttons .btn-metal {
            flex: 1;
            font-size: 10px;
        }

        /* --- Resplandor de Tarjetas por Nivel (Estilo Catálogo) --- */
        .course-card-level-basico {
            border: 1px solid rgba(6, 182, 212, 0.35);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.2);
        }
        .course-card-level-basico:hover {
            border-color: #06b6d4;
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.45);
        }

        .course-card-level-intermedio {
            border: 1px solid rgba(168, 85, 247, 0.35);
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.2);
        }
        .course-card-level-intermedio:hover {
            border-color: #a855f7;
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.45);
        }

        .course-card-level-avanzado {
            border: 1px solid rgba(245, 158, 11, 0.35);
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.2);
        }
        .course-card-level-avanzado:hover {
            border-color: #f59e0b;
            box-shadow: 0 0 25px rgba(245, 158, 11, 0.45);
        }

        /* --- Estilo Tarjeta Misión --- */
        .mission-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(6, 182, 212, 0.35);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.2);
        }
        .mission-card:hover {
            border-color: #06b6d4;
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.45);
        }

        body:not(.light-mode) .mission-card {
            border: 1px solid rgba(6, 182, 212, 0.5);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.25);
        }
        body:not(.light-mode) .mission-card:hover {
            border-color: #06b6d4;
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        /* --- Estilo Tarjeta Misión (Modo Claro) --- */
        body.light-mode .mission-card {
            background-color: #ffffff !important;
            border-color: #e2e8f0 !important;
        }
        body.light-mode .mission-card h3 {
            color: #1e293b !important;
        }
        body.light-mode .mission-card ul {
            color: #475569 !important;
        }

        /* --- Estilo Tarjeta Misión (Modo Oscuro) --- */
        body:not(.light-mode) .mission-card { 
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(30, 41, 59, 0.8) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        body:not(.light-mode) .mission-card h3 { color: #ffffff; }
        body:not(.light-mode) .mission-card ul { color: #cbd5e1; } /* slate-300 */

        /* Dark mode overrides para las tarjetas */
        body:not(.light-mode) .course-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            /* El borde y la sombra ahora son controlados por las clases de nivel */
        }

        /* --- Resplandor de Tarjetas por Nivel (MODO OSCURO) --- */
        body:not(.light-mode) .course-card-level-basico {
            border: 1px solid rgba(6, 182, 212, 0.5);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.25);
        }
        body:not(.light-mode) .course-card-level-basico:hover {
            border-color: #06b6d4;
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
        }

        body:not(.light-mode) .course-card-level-intermedio {
            border: 1px solid rgba(168, 85, 247, 0.5);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.25);
        }
        body:not(.light-mode) .course-card-level-intermedio:hover {
            border-color: #a855f7;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.5);
        }

        body:not(.light-mode) .course-card-level-avanzado {
            border: 1px solid rgba(245, 158, 11, 0.5);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.25);
        }
        body:not(.light-mode) .course-card-level-avanzado:hover {
            border-color: #f59e0b;
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.5);
        }

        body:not(.light-mode) .course-card .course-card-footer { border-top-color: rgba(218, 222, 241, 0.1); }
        body:not(.light-mode) .course-card .course-card-price { color: var(--text-light); }
    </style>

    function getFlagEmoji(countryName) {
        const name = countryName.toLowerCase();
        if (name.includes('venezuela')) return '🇻🇪';
        if (name.includes('colombia')) return '🇨🇴';
        if (name.includes('mexico') || name.includes('méxico')) return '🇲🇽';
        if (name.includes('españa') || name.includes('spain')) return '🇪🇸';
        if (name.includes('argentina')) return '🇦🇷';

    // ==========================================

    function showNotif(t,m, type = 'success') { 
        const n = document.getElementById('notification'); const icon = document.getElementById('notifIcon');
        document.getElementById('notifTitle').innerText = t; document.getElementById('notifMsg').innerText = m; 
        if (t.toLowerCase().includes('error') || t.toLowerCase().includes('denegado') || type === 'error') { n.classList.remove('bg-emerald-600', 'bg-blue-600'); n.classList.add('bg-red-600'); icon.className = 'fas fa-exclamation-circle text-2xl'; } 
        else if(type === 'info') { n.classList.remove('bg-emerald-600', 'bg-red-600'); n.classList.add('bg-blue-600'); icon.className = 'fas fa-info-circle text-2xl'; }
        else { n.classList.remove('bg-red-600', 'bg-blue-600'); n.classList.add('bg-emerald-600'); icon.className = 'fas fa-check-circle text-2xl'; }
        n.classList.add('show'); setTimeout(() => n.classList.remove('show'), 4000); 
    }

    function ping(action, key) {
        try {
            if (navigator.sendBeacon) {
                navigator.sendBeacon(SCRIPT_URL, new URLSearchParams({action, key}));
            } else {
                fetch(SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: `action=${encodeURIComponent(action)}&key=${encodeURIComponent(key)}` });
            }
        } catch (e) { console.error('Ping error:', e); }
    }

    async function fetchWithRetry(url, options = {}, maxRetries = 3) {
        let delay = 1000;
        for (let i = 0; i < maxRetries; i++) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 6000);
                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(timeoutId);
                if (options.mode === 'no-cors') return { status: "sent" };
                if (response.ok) return response;
                throw new Error(`Error HTTP: ${response.status}`);
            } catch (err) {
                if (i === maxRetries - 1) throw err;
                await new Promise(res => setTimeout(res, delay));
                delay *= 2;
            }
        }
    }

    function startDownload(softwareName, url, progId) {
        if (!currentUser) { 
            showNotif('Acceso Restringido', 'Debes iniciar sesión para descargar.'); 
            AuthUI.openModal('login'); 
            return; 
        }
        
        if (!currentUser.downloadedPrograms) currentUser.downloadedPrograms = [];
        if (!currentUser.downloadedPrograms.includes(progId)) { 
            currentUser.downloadedPrograms.push(progId); 
        }

        if (!currentUser.downloadedFiles || Array.isArray(currentUser.downloadedFiles)) {
            currentUser.downloadedFiles = {};
        }
        currentUser.downloadedFiles[progId] = (currentUser.downloadedFiles[progId] || 0) + 1;

        localStorage.setItem('user', JSON.stringify(currentUser)); 
        
        if (!url || url.trim() === "") {
            showNotif('No Disponible', 'Enlace no configurado.', 'info');
            return;
        }

        window.open(url, '_blank');
        showToastDownload(softwareName);
        
        programCounts[softwareName] = (parseInt(programCounts[softwareName]) || 0) + 1;
        
        const countEl = document.getElementById(`progCount-${progId}`);
        if (countEl) countEl.innerText = programCounts[softwareName];
        
        fetchWithRetry(`${SCRIPT_URL}?action=record_download&programa=${encodeURIComponent(softwareName)}&pais=${encodeURIComponent(userCountry)}&email=${encodeURIComponent(currentUser.email)}`, { 
            method: 'GET', 
            mode: 'no-cors' 
        }).catch(err => console.error('Error registrando descarga:', err));
        
        syncUserProgressToExcel(); 
        updateAllUI();
    }

    async function loadData() {
        if (typeof showSyncIndicator === 'function') showSyncIndicator('Conectando con la base de datos...', 'loading');
        try {
            const res = await fetch(`${SCRIPT_URL}?action=get_data&t=${Date.now()}`);
            const data = await res.json();
            
            if(data.status === 'success') {
                dbUsers = data.users || {}; 
                globalStats = data.stats || {};
                dbUserCourses = data.userCourses || {};
                dbUserDetails = data.userDetails || {};
                
                if (currentUser && currentUser.email) {
                    const email = currentUser.email.toLowerCase();
                    let globalUser = dbUsers[email] || {};
                    if (typeof globalUser === 'string') { try { globalUser = JSON.parse(globalUser); } catch(e) { globalUser = {}; } }
                    let details = dbUserDetails[email] || {};

                    if(details.name && details.name !== "No provisto" && details.name !== "N/A") currentUser.name = details.name;
                    currentUser.downloadedPrograms = globalUser.downloadedPrograms || currentUser.downloadedPrograms || [];

                    const toObject = (data) => {
                        if (!data || Array.isArray(data)) return {};
                        return data;
                    };
                    const serverFiles = toObject(globalUser.downloadedFiles);
                    const localFiles = toObject(currentUser.downloadedFiles);
                    currentUser.downloadedFiles = { ...serverFiles, ...localFiles };

                    localStorage.setItem('user', JSON.stringify(currentUser));
                    updateAllUI(); 
                }
                
                try {
                    const downloadRes = await fetch(`${SCRIPT_URL}?action=get_downloads`);
                    const downloadData = await downloadRes.json();
                    if (downloadData && downloadData.counts) {
                        programCounts = downloadData.counts;
                        DESCARGAS_PROGRAMAS.forEach(prog => {
                            const countEl = document.getElementById(`progCount-${prog.id}`);
                            if(countEl) {
                                const key = `${prog.name} ${prog.version}`;
                                countEl.innerText = programCounts[key] || 0;
                            }
                        });
                    }
                } catch(e) {
                    console.error('Error cargando conteos de descargas:', e);
                }
                
                if (typeof showSyncIndicator === 'function') showSyncIndicator('Datos sincronizados correctamente', 'success');
            }
        } catch (e) { 
            console.error("Error al cargar la data global del Excel:", e); 
            if (typeof showSyncIndicator === 'function') showSyncIndicator('Modo sin conexión', 'error');
        }
    }

    async function initVisitorInfo() {
        const services = [ 'https://get.geojs.io/v1/ip/geo.json', 'https://api.country.is', 'https://ipapi.co/json/' ];
        for (const service of services) {
            try {
                const controller = new AbortController(); const timeoutId = setTimeout(() => controller.abort(), 4000);
                const res = await fetch(service, { signal: controller.signal }); clearTimeout(timeoutId);
                if (!res.ok) continue; const data = await res.json();
                
                let rawCountryName = data.country || data.countryName || data.country_name || "";
                let countryCode = data.country_code || data.countryCode || data.country || "";
                let region = data.region || data.regionName || data.stateProv || data.city || "";

                if (rawCountryName && rawCountryName !== "Desconocido") {
                    let baseName = countryToSpanish[rawCountryName.toLowerCase()] || rawCountryName;
                    if (baseName === "Venezuela" || (countryCode && countryCode.toLowerCase() === "ve")) {
                        userCountry = region ? `Venezuela (${region})` : "Venezuela";
                    } else { userCountry = baseName; }
                    ping('update_stat', 'visitas_totales');
                    ping('update_stat', 'visita_pais_' + baseName);
                    return;
                }
            } catch (e) { console.warn(`Fallo geoip ${service}:`, e.message); }
        }
    }

    document.addEventListener("DOMContentLoaded", async () => {
        currentUser = JSON.parse(localStorage.getItem('user')) || null;
        
        updateAllUI();
        renderPrograms(DESCARGAS_PROGRAMAS);
        
        await initVisitorInfo();
        await loadData();
        
        try {
            const res = await fetchWithRetry(`${SCRIPT_URL}?action=get_downloads`);
            const data = await res.json();
            if (data && data.counts) {
                programCounts = data.counts;
                DESCARGAS_PROGRAMAS.forEach(prog => {
                    const countEl = document.getElementById(`progCount-${prog.id}`);
                    if(countEl) {
                        const key = `${prog.name} ${prog.version}`;
                        countEl.innerText = programCounts[key] || 0;
                    }
                });
            }
        } catch(err) {
            console.error('Error cargando conteos de descargas:', err);
        }
        
        if(window.lucide) lucide.createIcons();
    });
</script>

<script src="js/auth.js"></script>
<script src="js/navbar.js"></script>
<script src="js/footer.js"></script>
</body>
